<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Course Study Agent</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-soft: #f0f4f7;
        --ink: #18202b;
        --muted: #667085;
        --line: #dce3ea;
        --teal: #0f766e;
        --teal-2: #14b8a6;
        --indigo: #3343b5;
        --amber: #b7791f;
        --danger: #be123c;
        --shadow: 0 16px 40px rgba(28, 39, 49, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--teal), var(--indigo));
        color: #fff;
        font-weight: 800;
      }

      .brand-title {
        font-size: 18px;
        font-weight: 760;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--amber);
      }

      .status-dot.ok {
        background: var(--teal-2);
      }

      .workspace {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) 360px;
        gap: 18px;
        padding: 18px;
        max-width: 1500px;
        width: 100%;
        margin: 0 auto;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        min-width: 0;
      }

      .sidebar,
      .inspector {
        padding: 16px;
        align-self: start;
        position: sticky;
        top: 82px;
      }

      .section-title {
        font-size: 13px;
        font-weight: 760;
        color: #3b4755;
        margin: 2px 0 10px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .metric {
        background: var(--panel-soft);
        border: 1px solid #e4eaf0;
        border-radius: 8px;
        padding: 10px;
        min-height: 72px;
      }

      .metric-value {
        font-size: 22px;
        font-weight: 760;
      }

      .metric-label {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .doc-list {
        display: grid;
        gap: 8px;
      }

      .upload-card {
        border: 1px dashed #b7c7d6;
        border-radius: 8px;
        padding: 12px;
        background: #fbfcfd;
        margin-bottom: 18px;
      }

      .upload-button {
        width: 100%;
        height: 38px;
        border: 1px solid var(--teal);
        background: #fff;
        color: var(--teal);
        border-radius: 8px;
        cursor: pointer;
        font-weight: 760;
      }

      .upload-button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .doc-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fff;
      }

      .doc-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .doc-title {
        font-weight: 700;
        font-size: 13px;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .doc-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }

      .delete-button {
        border: 1px solid #ffd1da;
        background: #fff6f8;
        color: var(--danger);
        border-radius: 6px;
        min-width: 42px;
        height: 26px;
        padding: 0 8px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        flex: 0 0 auto;
      }

      .delete-button:hover {
        background: #ffe8ee;
      }

      .delete-button:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      .main {
        display: grid;
        gap: 14px;
        align-self: start;
      }

      .query-panel {
        padding: 16px;
      }

      .query-tools {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .mode-tabs {
        display: flex;
        gap: 6px;
        padding: 4px;
        background: var(--panel-soft);
        border-radius: 8px;
      }

      .mode-tab {
        border: 0;
        background: transparent;
        color: var(--muted);
        border-radius: 6px;
        padding: 8px 10px;
        cursor: pointer;
        font-weight: 650;
      }

      .mode-tab.active {
        background: #fff;
        color: var(--teal);
        box-shadow: 0 3px 12px rgba(15, 118, 110, 0.12);
      }

      .query-box {
        width: 100%;
        min-height: 132px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        color: var(--ink);
        font: inherit;
        line-height: 1.55;
        outline: none;
      }

      .query-box:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.16);
      }

      .action-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 12px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        border: 1px solid var(--line);
        background: #fff;
        color: #344054;
        border-radius: 999px;
        padding: 7px 10px;
        cursor: pointer;
        font-size: 13px;
      }

      .chip:hover {
        border-color: var(--teal);
        color: var(--teal);
      }

      .ask-button {
        border: 0;
        background: var(--teal);
        color: #fff;
        border-radius: 8px;
        height: 42px;
        padding: 0 18px;
        cursor: pointer;
        font-weight: 760;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      .ask-button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .answer-panel {
        padding: 18px;
        min-height: 260px;
      }

      .answer-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }

      .intent {
        border-radius: 999px;
        background: #eef8f7;
        color: var(--teal);
        border: 1px solid #caece8;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .answer {
        white-space: pre-wrap;
        line-height: 1.75;
        font-size: 15px;
      }

      .empty {
        color: var(--muted);
        min-height: 180px;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .citation-list,
      .trace-list {
        display: grid;
        gap: 10px;
      }

      .citation,
      .trace {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fff;
      }

      .citation-head,
      .trace-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .citation-title,
      .trace-title {
        font-size: 13px;
        font-weight: 760;
      }

      .score {
        color: var(--indigo);
        background: #eef0ff;
        border-radius: 999px;
        padding: 3px 7px;
        font-size: 12px;
        font-weight: 760;
      }

      .snippet,
      .trace-body {
        color: #475467;
        line-height: 1.55;
        font-size: 12px;
        margin-top: 8px;
      }

      .trace-body code {
        white-space: normal;
        word-break: break-word;
      }

      .runtime {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      .runtime-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 8px 0;
        color: var(--muted);
        font-size: 13px;
      }

      .runtime-row strong {
        color: var(--ink);
      }

      .error {
        color: var(--danger);
        background: #fff1f3;
        border: 1px solid #ffd7df;
        border-radius: 8px;
        padding: 12px;
        display: none;
      }

      @media (max-width: 1120px) {
        .workspace {
          grid-template-columns: 240px minmax(0, 1fr);
        }

        .inspector {
          grid-column: 1 / -1;
          position: static;
        }
      }

      @media (max-width: 760px) {
        .topbar {
          height: auto;
          padding: 14px;
          align-items: flex-start;
          gap: 8px;
          flex-direction: column;
        }

        .workspace {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .sidebar {
          position: static;
        }

        .action-row,
        .query-tools {
          align-items: stretch;
          flex-direction: column;
        }

        .ask-button {
          justify-content: center;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <div class="brand-title">AI Course Study Agent</div>
          </div>
        </div>
        <div class="status-row">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Checking service</span>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel sidebar">
          <div class="section-title">Course Materials</div>
          <div class="metric-grid">
            <div class="metric">
              <div class="metric-value" id="docCount">-</div>
              <div class="metric-label">Documents</div>
            </div>
            <div class="metric">
              <div class="metric-value" id="chunkCount">-</div>
              <div class="metric-label">Chunks</div>
            </div>
          </div>
          <div class="upload-card">
            <input id="fileInput" type="file" accept=".md,.txt,.pdf,.docx" hidden />
            <button class="upload-button" id="uploadButton">上传课程资料</button>
            <div class="doc-meta" id="uploadStatus">支持 PDF、DOCX、TXT、Markdown</div>
          </div>
          <div class="section-title">Materials</div>
          <div class="doc-list" id="docList"></div>
        </aside>

        <section class="main">
          <div class="panel query-panel">
            <div class="query-tools">
              <div class="mode-tabs" aria-label="query presets">
                <button class="mode-tab active" data-query="帮我总结 RAG 与 Agent 的复习重点">Summary</button>
                <button class="mode-tab" data-query="根据数据库事务和隔离级别出 5 道选择题">Quiz</button>
                <button class="mode-tab" data-query="什么是 RAG？请结合资料解释">Q&A</button>
                <button class="mode-tab" data-query="帮我制定三天复习计划">Plan</button>
              </div>
            </div>
            <textarea
              class="query-box"
              id="queryInput"
              spellcheck="false"
            >帮我总结 RAG 与 Agent 的复习重点</textarea>
            <div class="action-row">
              <div class="chips">
                <button class="chip" data-query="根据数据库事务和隔离级别出 5 道选择题">出题练习</button>
                <button class="chip" data-query="我这部分总错，帮我做错题回顾">错题回顾</button>
                <button class="chip" data-query="如何把 TF-IDF 替换成真实 Embedding 和向量数据库？">向量库升级</button>
              </div>
              <button class="ask-button" id="askButton">
                <span>Ask</span>
                <span aria-hidden="true">→</span>
              </button>
            </div>
            <div class="error" id="errorBox"></div>
          </div>

          <div class="panel answer-panel">
            <div class="answer-header">
              <div class="section-title">Answer</div>
              <div class="intent" id="intentBadge">idle</div>
            </div>
            <div class="empty" id="emptyState">上传课程资料，或直接用样例资料体验总结、问答、出题和复习计划。</div>
            <div class="answer" id="answerText"></div>
          </div>
        </section>

        <aside class="panel inspector">
          <div class="section-title">Runtime</div>
          <div class="runtime" id="runtime">
            <div class="runtime-row"><span>Latency</span><strong>-</strong></div>
            <div class="runtime-row"><span>Retrieved</span><strong>-</strong></div>
            <div class="runtime-row"><span>LLM Mode</span><strong>-</strong></div>
          </div>
          <div class="section-title">Evidence</div>
          <div class="citation-list" id="citations"></div>
          <div class="section-title" style="margin-top: 18px">Agent Trace</div>
          <div class="trace-list" id="trace"></div>
        </aside>
      </main>
    </div>

    <script>
      const state = {
        sessionId: localStorage.getItem("agent_session_id") || null,
        busy: false,
      };

      const queryInput = document.getElementById("queryInput");
      const askButton = document.getElementById("askButton");
      const uploadButton = document.getElementById("uploadButton");
      const fileInput = document.getElementById("fileInput");
      const uploadStatus = document.getElementById("uploadStatus");
      const answerText = document.getElementById("answerText");
      const emptyState = document.getElementById("emptyState");
      const intentBadge = document.getElementById("intentBadge");
      const citations = document.getElementById("citations");
      const trace = document.getElementById("trace");
      const runtime = document.getElementById("runtime");
      const errorBox = document.getElementById("errorBox");

      document.querySelectorAll("[data-query]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".mode-tab").forEach((tab) => tab.classList.remove("active"));
          if (button.classList.contains("mode-tab")) button.classList.add("active");
          queryInput.value = button.dataset.query;
          queryInput.focus();
        });
      });

      askButton.addEventListener("click", ask);
      uploadButton.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", uploadMaterial);
      document.getElementById("docList").addEventListener("click", (event) => {
        const button = event.target.closest("[data-delete-doc]");
        if (!button) return;
        deleteMaterial(button.dataset.deleteDoc, button.dataset.docTitle || "");
      });
      queryInput.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") ask();
      });

      async function loadHealth() {
        try {
          const response = await fetch("/api/health");
          const data = await response.json();
          document.getElementById("statusDot").classList.add("ok");
          document.getElementById("statusText").textContent = "Service online";
          document.getElementById("docCount").textContent = data.kb.documents;
          document.getElementById("chunkCount").textContent = data.kb.chunks;
          await loadDocuments();
        } catch (error) {
          document.getElementById("statusText").textContent = "Service unavailable";
        }
      }

      async function uploadMaterial() {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        uploadButton.disabled = true;
        uploadButton.textContent = "解析中";
        uploadStatus.textContent = file.name;
        hideError();
        try {
          const content = await readFileAsDataUrl(file);
          const response = await fetch("/api/kb/upload", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              filename: file.name,
              title: file.name.replace(/\.[^.]+$/, ""),
              content_base64: content,
            }),
          });
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          uploadStatus.textContent = data.warning
            ? `已加入知识库：${data.document}，但${data.warning}`
            : `已加入知识库：${data.document}`;
          await loadHealth();
        } catch (error) {
          uploadStatus.textContent = "上传失败";
          showError(error.message || String(error));
        } finally {
          uploadButton.disabled = false;
          uploadButton.textContent = "上传课程资料";
          fileInput.value = "";
        }
      }

      async function loadDocuments() {
        const response = await fetch("/api/kb/documents");
        const docs = await response.json();
        const list = document.getElementById("docList");
        list.innerHTML = docs
          .map(
            (doc) => `
              <div class="doc-item">
                <div class="doc-head">
                  <div class="doc-title">${escapeHtml(doc.title)}</div>
                  <button
                    class="delete-button"
                    type="button"
                    data-delete-doc="${escapeHtml(doc.doc_id)}"
                    data-doc-title="${escapeHtml(doc.title)}"
                  >删除</button>
                </div>
                <div class="doc-meta">${doc.chunks} chunks · ${escapeHtml(doc.source)}</div>
              </div>
            `,
          )
          .join("");
      }

      async function deleteMaterial(docId, title) {
        if (!docId) return;
        const ok = window.confirm(`确定要从知识库删除「${title || docId}」吗？这会移除该资料及其索引。`);
        if (!ok) return;
        hideError();
        const button = document.querySelector(`[data-delete-doc="${cssEscape(docId)}"]`);
        if (button) {
          button.disabled = true;
          button.textContent = "删除中";
        }
        try {
          const response = await fetch(`/api/kb/documents/${encodeURIComponent(docId)}`, {
            method: "DELETE",
          });
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          uploadStatus.textContent = `已删除：${data.deleted}`;
          document.getElementById("docCount").textContent = data.kb.documents;
          document.getElementById("chunkCount").textContent = data.kb.chunks;
          await loadDocuments();
        } catch (error) {
          showError(error.message || String(error));
          if (button) {
            button.disabled = false;
            button.textContent = "删除";
          }
        }
      }

      async function ask() {
        if (state.busy) return;
        const query = queryInput.value.trim();
        if (!query) return;
        setBusy(true);
        hideError();
        try {
          const response = await fetch("/api/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              query,
              session_id: state.sessionId,
              top_k: 6,
            }),
          });
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          state.sessionId = data.session_id;
          localStorage.setItem("agent_session_id", data.session_id);
          renderAnswer(data);
        } catch (error) {
          showError(error.message || String(error));
        } finally {
          setBusy(false);
        }
      }

      function renderAnswer(data) {
        emptyState.style.display = "none";
        answerText.textContent = data.answer;
        intentBadge.textContent = data.intent;
        runtime.innerHTML = `
          <div class="runtime-row"><span>Latency</span><strong>${data.metrics.latency_ms} ms</strong></div>
          <div class="runtime-row"><span>Retrieved</span><strong>${data.metrics.retrieved_chunks}</strong></div>
          <div class="runtime-row"><span>Router</span><strong>${data.metrics.router_confidence}</strong></div>
          <div class="runtime-row"><span>LLM Mode</span><strong>${escapeHtml(data.metrics.llm_mode)}</strong></div>
        `;
        citations.innerHTML = data.citations.map(renderCitation).join("");
        trace.innerHTML = data.trace.map(renderTrace).join("");
      }

      function renderCitation(item) {
        return `
          <div class="citation">
            <div class="citation-head">
              <div class="citation-title">${escapeHtml(item.section)}</div>
              <div class="score">${item.score}</div>
            </div>
            <div class="snippet">${escapeHtml(item.snippet)}</div>
            <div class="doc-meta">${escapeHtml(item.source)}</div>
          </div>
        `;
      }

      function renderTrace(item) {
        return `
          <div class="trace">
            <div class="trace-head">
              <div class="trace-title">${escapeHtml(item.name)}</div>
              <div class="score">${item.latency_ms}ms</div>
            </div>
            <div class="trace-body"><code>${escapeHtml(JSON.stringify(item.output))}</code></div>
          </div>
        `;
      }

      function setBusy(value) {
        state.busy = value;
        askButton.disabled = value;
        askButton.querySelector("span").textContent = value ? "Thinking" : "Ask";
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      function hideError() {
        errorBox.style.display = "none";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function cssEscape(value) {
        if (window.CSS && typeof window.CSS.escape === "function") {
          return window.CSS.escape(value);
        }
        return String(value).replace(/["\\]/g, "\\$&");
      }

      loadHealth();
    </script>
  </body>
</html>
